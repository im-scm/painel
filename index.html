<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SCM Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="container">

<h1>SCM Dashboard</h1>

<!-- ✅ UPLOAD RESTAURADO -->
<button onclick="document.getElementById('fileInput').click()">
Upload Excel
</button>

<div ondrop="dropHandler(event)" ondragover="dragOverHandler(event)"
     style="border:1px dashed grey; padding:10px; margin:10px;">
Arraste Excel aqui
</div>

<input type="file" id="fileInput" style="display:none;" onchange="handleFileSelect(event)">

<!-- ================= KPIs ================= -->
<div class="kpis">

<div id="celuloseKPI"></div>
<div id="celuloseCNKPI"></div>
<div id="tio2KPI"></div>
<div id="resinasKPI"></div>
<div id="freteImportKPI"></div>
<div id="freteExportKPI"></div>

</div>

<!-- ================= CHARTS ================= -->
<canvas id="celuloseChart"></canvas>
<canvas id="tio2Chart"></canvas>
<canvas id="metanolChart"></canvas>
<canvas id="ureiaChart"></canvas>
<canvas id="melaminaChart"></canvas>
<canvas id="resinasChart"></canvas>
<canvas id="moedasChart"></canvas>
<canvas id="freteimportChart"></canvas>
<canvas id="freteexportChart"></canvas>

</div>

<script src="app.js"></script>

</body>
</html>
